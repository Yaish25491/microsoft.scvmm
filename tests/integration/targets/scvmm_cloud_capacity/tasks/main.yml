---
- name: Test Cloud Capacity Gathering (Expect Failure)
  microsoft.scvmm.scvmm_cloud_capacity:
    name: "NonExistentCloud"
  register: capacity_result
  ignore_errors: true

- name: Assert graceful failure
  assert:
    that:
      - capacity_result.failed == true
      - capacity_result.msg is defined or capacity_result.module_stderr is defined
      - (create_result.msg | default('') or create_result.module_stderr | default('')) is defined or create_result.module_stderr is defined
      - "('Cloud ' in (capacity_result.msg | default('')) or 'powershell' in (capacity_result.module_stderr | default('')))"
