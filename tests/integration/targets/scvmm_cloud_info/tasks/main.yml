---
- name: Gather info on all SCVMM Private Clouds
  microsoft.scvmm.scvmm_cloud_info:
  register: all_clouds

- name: Assert info was gathered
  assert:
    that:
      - all_clouds.clouds is defined
      - all_clouds.clouds | type_debug == "list"

- name: Gather info on all SCVMM Private Clouds in check mode
  microsoft.scvmm.scvmm_cloud_info:
  check_mode: true
  register: all_clouds_check_mode

- name: Assert info was gathered in check mode
  assert:
    that:
      - all_clouds_check_mode.clouds is defined
      - all_clouds_check_mode.clouds | length == all_clouds.clouds | length

- name: Gather info by name if clouds exist
  when: all_clouds.clouds | length > 0
  block:
    - name: Gather info on a specific cloud by name
      microsoft.scvmm.scvmm_cloud_info:
        name: "{{ all_clouds.clouds[0].name }}"
      register: specific_cloud

    - name: Assert specific cloud info was gathered
      assert:
        that:
          - specific_cloud.clouds is defined
          - specific_cloud.clouds | length == 1
          - specific_cloud.clouds[0].name == all_clouds.clouds[0].name
          - specific_cloud.clouds[0].id == all_clouds.clouds[0].id

    - name: Gather info on a specific cloud by name in check mode
      microsoft.scvmm.scvmm_cloud_info:
        name: "{{ all_clouds.clouds[0].name }}"
      check_mode: true
      register: specific_cloud_check

    - name: Assert specific cloud info was gathered in check mode
      assert:
        that:
          - specific_cloud_check.clouds is defined
          - specific_cloud_check.clouds | length == 1
          - specific_cloud_check.clouds[0].name == all_clouds.clouds[0].name

- name: Gather info on a non-existent cloud
  microsoft.scvmm.scvmm_cloud_info:
    name: "NonExistentCloud_1234567890"
  register: non_existent_cloud

- name: Assert empty list is returned for non-existent cloud
  assert:
    that:
      - non_existent_cloud.clouds is defined
      - non_existent_cloud.clouds | length == 0
