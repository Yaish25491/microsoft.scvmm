---
- block:
    - name: Run tests
      ansible.builtin.include_tasks: tests.yml
  always:
    - name: Teardown - Reset host description
      microsoft.scvmm.scvmm_host:
        name: "{{ test_host_name }}"
        description: ""
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true
