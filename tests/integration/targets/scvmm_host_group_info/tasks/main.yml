---
- name: Define test variables
  set_fact:
    test_host_group_name: "AnsibleTest_HGInfo_{{ 99999 | random }}"

- block:
    - name: Setup - Create test host group via PowerShell
      ansible.windows.win_shell: |
        Import-Module VirtualMachineManager
        $vmm = Get-SCVMMServer -ComputerName "{{ scvmm_server }}"
        $parent = Get-SCVMHostGroup -VMMServer $vmm -Name "All Hosts"
        New-SCVMHostGroup -VMMServer $vmm -Name "{{ test_host_group_name }}" -ParentHostGroup $parent

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test host group via PowerShell
      ansible.windows.win_shell: |
        Import-Module VirtualMachineManager
        $vmm = Get-SCVMMServer -ComputerName "{{ scvmm_server }}"
        $hg = Get-SCVMHostGroup -VMMServer $vmm | Where-Object { $_.Name -eq "{{ test_host_group_name }}" }
        if ($hg) { Remove-SCVMHostGroup -VMHostGroup $hg }
      ignore_errors: true
