---
# ── Get adapters for specific host ──
- name: Get network adapters for host
  microsoft.scvmm.scvmm_host_network_adapter_info:
    vm_host: "{{ test_vm_host }}"
    vmm_server: "{{ scvmm_server }}"
  register: host_adapters

- name: Assert adapters were returned
  assert:
    that:
      - host_adapters.network_adapters is defined
      - host_adapters.network_adapters | length > 0
      - host_adapters is not changed

# ── Verify adapter properties ──
- name: Assert adapter has expected properties
  assert:
    that:
      - host_adapters.network_adapters[0].id is defined
      - host_adapters.network_adapters[0].name is defined
      - host_adapters.network_adapters[0].mac_address is defined
      - host_adapters.network_adapters[0].ip_addresses is defined
      - host_adapters.network_adapters[0].vm_host is defined
