---
- name: Define test variables
  set_fact:
    test_vm: "AnsibleTest_Rating_{{ 99999 | random }}"

- block:
    - name: Setup - Create test VM via PowerShell
      ansible.windows.win_shell: |
        Import-Module VirtualMachineManager
        $vmm = Get-SCVMMServer -ComputerName "{{ scvmm_server }}"
        $template = Get-SCVMTemplate -VMMServer $vmm -Name "{{ test_vm_template }}"
        $vmHost = Get-SCVMHost -VMMServer $vmm -ComputerName "{{ test_vm_host }}"
        $jobGroup = [guid]::NewGuid()
        New-SCVirtualMachine -VMTemplate $template -Name "{{ test_vm }}" -VMHost $vmHost -JobGroup $jobGroup -RunAsynchronously $false
      register: setup_vm
      ignore_errors: true

    - name: Fallback - Use existing VM if creation failed
      ansible.windows.win_shell: |
        Import-Module VirtualMachineManager
        $vmm = Get-SCVMMServer -ComputerName "{{ scvmm_server }}"
        $vm = (Get-SCVirtualMachine -VMMServer $vmm | Select-Object -First 1).Name
        if ($vm) { Write-Output $vm } else { Write-Error "No VMs available" }
      register: fallback_vm
      when: setup_vm is failed

    - name: Set actual test VM name
      set_fact:
        test_vm: "{{ fallback_vm.stdout | trim }}"
      when: setup_vm is failed and fallback_vm is succeeded

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test VM
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true
      when: setup_vm is succeeded
