---
- name: Test scvmm_port_classification
  block:
    - name: Ensure test port classification is absent (setup)
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        state: absent

    - name: Create new port classification
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        description: "Test description"
        state: present
      register: create_result

    - name: Assert create changed
      ansible.builtin.assert:
        that:
          - create_result.changed == true
          - create_result.port_classification.name == "AnsibleTestPortClass"
          - create_result.port_classification.description == "Test description"

    - name: Create new port classification (Idempotency)
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        description: "Test description"
        state: present
      register: create_idem_result

    - name: Assert create idempotency
      ansible.builtin.assert:
        that:
          - create_idem_result.changed == false

    - name: Update port classification description in check mode
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        description: "Updated description check mode"
        state: present
      check_mode: true
      register: update_check_result

    - name: Assert update check mode changed
      ansible.builtin.assert:
        that:
          - update_check_result.changed == true
          - update_check_result.port_classification.description == "Updated description check mode"

    - name: Update port classification description
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        description: "Updated description"
        state: present
      register: update_result

    - name: Assert update changed
      ansible.builtin.assert:
        that:
          - update_result.changed == true
          - update_result.port_classification.description == "Updated description"

    - name: Update port classification (Idempotency)
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        description: "Updated description"
        state: present
      register: update_idem_result

    - name: Assert update idempotency
      ansible.builtin.assert:
        that:
          - update_idem_result.changed == false

    - name: Remove port classification in check mode
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        state: absent
      check_mode: true
      register: remove_check_result

    - name: Assert remove check mode changed
      ansible.builtin.assert:
        that:
          - remove_check_result.changed == true

    - name: Remove port classification
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        state: absent
      register: remove_result

    - name: Assert remove changed
      ansible.builtin.assert:
        that:
          - remove_result.changed == true

    - name: Remove port classification (Idempotency)
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        state: absent
      register: remove_idem_result

    - name: Assert remove idempotency
      ansible.builtin.assert:
        that:
          - remove_idem_result.changed == false
  always:
    - name: Ensure test port classification is absent (cleanup)
      microsoft.scvmm.scvmm_port_classification:
        name: "AnsibleTestPortClass"
        state: absent
      ignore_errors: true
