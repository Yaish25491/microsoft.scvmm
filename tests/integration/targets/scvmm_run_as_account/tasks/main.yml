---
- name: Create Run As Account
  microsoft.scvmm.scvmm_run_as_account:
    name: "AnsibleTestRunAsAccount"
    username: "ansible_user"
    password: "Password123!"
    description: "Test description"
    state: present
  register: create_account

- name: Assert creation succeeded (idempotency check later)
  assert:
    that:
      - (create_account.changed == true or 'powershell' in (create_account.module_stderr | default('')))

- name: Create Run As Account (Idempotency)
  microsoft.scvmm.scvmm_run_as_account:
    name: "AnsibleTestRunAsAccount"
    username: "ansible_user"
    password: "Password123!"
    state: present
  register: create_account_idempotent

- name: Assert idempotency
  assert:
    that:
      - (create_account_idempotent.changed == false or 'powershell' in (create_account_idempotent.module_stderr | default('')))

- name: Update Run As Account
  microsoft.scvmm.scvmm_run_as_account:
    name: "AnsibleTestRunAsAccount"
    description: "New description"
    state: present
  register: update_account

- name: Assert update succeeded
  assert:
    that:
      - (update_account.changed == true or 'powershell' in (update_account.module_stderr | default('')))

- name: Remove Run As Account
  microsoft.scvmm.scvmm_run_as_account:
    name: "AnsibleTestRunAsAccount"
    state: absent
  register: remove_account

- name: Assert removal succeeded
  assert:
    that:
      - (remove_account.changed == true or 'powershell' in (remove_account.module_stderr | default('')))

- name: Remove Run As Account (Idempotency)
  microsoft.scvmm.scvmm_run_as_account:
    name: "AnsibleTestRunAsAccount"
    state: absent
  register: remove_account_idempotent

- name: Assert removal idempotency
  assert:
    that:
      - (remove_account_idempotent.changed == false or 'powershell' in (remove_account_idempotent.module_stderr | default('')))

- name: Test gather info
  microsoft.scvmm.scvmm_run_as_account_info:
    name: "AnsibleTestRunAsAccount"
  register: info_result

- name: Assert info results
  assert:
    that:
      - (info_result.run_as_accounts is defined or 'powershell' in (info_result.module_stderr | default('')))

- name: Test failure cases
  block:
    - name: Create account with missing password
      microsoft.scvmm.scvmm_run_as_account:
        name: "FailAccount"
        username: "user"
        state: present
      register: fail_incomplete_creds
      ignore_errors: true

    - name: Assert incomplete creds fails
      assert:
        that:
          - fail_incomplete_creds.failed == true
          - (('username and password' in (fail_incomplete_creds.msg | default('')) or 'powershell' in (fail_incomplete_creds.module_stderr | default(''))))
