---
- name: Test SCVMM Run As Account Module
  block:
    - name: Ensure test account is absent initially
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        state: absent
      register: initial_cleanup

    - name: Create new Run As Account
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        description: "Test account for Ansible integration"
        user_name: "TESTDOMAIN\\ansibletest"
        password: "SuperSecretPassword123!"
        no_validation: true
        state: present
      register: create_account

    - name: Assert creation was successful
      assert:
        that:
          - create_account.changed == true
          - create_account.run_as_account.name == "AnsibleTestRunAsAccount"
          - create_account.run_as_account.description == "Test account for Ansible integration"
          - create_account.run_as_account.user_name == "TESTDOMAIN\\ansibletest"

    - name: Create new Run As Account (Idempotent)
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        description: "Test account for Ansible integration"
        state: present
      register: create_account_idempotent

    - name: Assert creation idempotency
      assert:
        that:
          - create_account_idempotent.changed == false

    - name: Update Run As Account description (Check Mode)
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        description: "Updated description in check mode"
        state: present
      check_mode: true
      register: update_account_check

    - name: Assert check mode update
      assert:
        that:
          - update_account_check.changed == true

    - name: Update Run As Account description
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        description: "Updated description"
        state: present
      register: update_account

    - name: Assert update was successful
      assert:
        that:
          - update_account.changed == true
          - update_account.run_as_account.description == "Updated description"

    - name: Update Run As Account credentials
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        user_name: "TESTDOMAIN\\ansibletest"
        password: "NewPassword456!"
        state: present
      register: update_creds

    - name: Assert creds update was successful
      assert:
        that:
          - update_creds.changed == true

    - name: Fail with incomplete credentials
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        user_name: "TESTDOMAIN\\ansibletest"
        state: present
      register: fail_incomplete_creds
      ignore_errors: true

    - name: Assert incomplete creds fails
      assert:
        that:
          - fail_incomplete_creds.failed == true
          - "'user_name and password must both be provided' in fail_incomplete_creds.msg"

    - name: Remove Run As Account
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        state: absent
      register: remove_account

    - name: Assert removal was successful
      assert:
        that:
          - remove_account.changed == true

    - name: Remove Run As Account (Idempotent)
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        state: absent
      register: remove_account_idempotent

    - name: Assert removal idempotency
      assert:
        that:
          - remove_account_idempotent.changed == false

  always:
    - name: Cleanup test account
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestRunAsAccount"
        state: absent
      ignore_errors: true
