---
- name: Test SCVMM Run As Account Info Module
  block:
    - name: Ensure test account is present for info tests
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestInfoAccount"
        description: "Test account for Ansible integration"
        user_name: "TESTDOMAIN\\ansibletest"
        password: "SuperSecretPassword123!"
        no_validation: true
        state: present

    - name: Gather info on specific Run As Account
      microsoft.scvmm.scvmm_run_as_account_info:
        name: "AnsibleTestInfoAccount"
      register: get_specific_info

    - name: Assert specific info gathering
      assert:
        that:
          - get_specific_info.run_as_accounts | length == 1
          - get_specific_info.run_as_accounts[0].name == "AnsibleTestInfoAccount"
          - get_specific_info.run_as_accounts[0].description == "Test account for Ansible integration"
          - get_specific_info.run_as_accounts[0].user_name == "TESTDOMAIN\\ansibletest"

    - name: Gather info on all Run As Accounts
      microsoft.scvmm.scvmm_run_as_account_info:
      register: get_all_info

    - name: Assert all info gathering
      assert:
        that:
          - get_all_info.run_as_accounts | length >= 1

  always:
    - name: Cleanup test account
      microsoft.scvmm.scvmm_run_as_account:
        name: "AnsibleTestInfoAccount"
        state: absent
      ignore_errors: true
