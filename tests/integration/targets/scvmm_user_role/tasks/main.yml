---
- name: Test SCVMM User Role creation (Expect Failure)
  microsoft.scvmm.scvmm_user_role:
    name: "AnsibleTestRole"
    state: present
    user_role_profile: "DelegatedAdmin"
    description: "Test description"
  register: create_result
  ignore_errors: true

- name: Assert failure gracefully
  assert:
    that:
      - create_result.failed == true
