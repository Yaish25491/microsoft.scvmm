---
- name: Define test variables
  set_fact:
    test_vm_vhd: "AnsibleTest_VHDInfo_{{ 99999 | random }}"

- block:
    - name: Setup - Create test VM for VHD query
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm_vhd }}"
        template: "{{ test_vm_template }}"
        vm_host: "{{ test_vm_host }}"
        state: present
        vmm_server: "{{ scvmm_server }}"

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test VM
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm_vhd }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true

    - name: Teardown - Validate VM removed
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm_vhd }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      register: teardown_validate

    - name: Teardown - Assert server is clean
      assert:
        that:
          - teardown_validate.changed == false
