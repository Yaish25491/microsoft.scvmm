---
- name: Test SCVMM VM Clone (Expect Failure)
  microsoft.scvmm.scvmm_vm_clone:
    name: "NonExistentVM"
    new_name: "AnsibleTestVMClone"
  register: clone_result
  ignore_errors: true

- name: Assert failure gracefully
  assert:
    that:
      - clone_result.failed == true
      - clone_result.msg is defined or clone_result.module_stderr is defined
      - (create_result.msg | default('') or create_result.module_stderr | default('')) is defined or create_result.module_stderr is defined
