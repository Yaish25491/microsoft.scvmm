---
# tasks file for scvmm_vm_info

- name: Gather VM info (All VMs)
  microsoft.scvmm.scvmm_vm_info:
  register: all_vms_info

- name: Assert all VMs info is gathered and changed is false
  assert:
    that:
      - not all_vms_info.changed
      - all_vms_info.vms is defined

- name: Gather VM info (Specific VM - Assuming test VM exists or we mock it, if no VM it returns empty)
  microsoft.scvmm.scvmm_vm_info:
    name: "NonExistentVM_12345"
  register: specific_vm_info

- name: Assert specific VM info returns empty list
  assert:
    that:
      - not specific_vm_info.changed
      - specific_vm_info.vms | length == 0

- name: Check Error Handling (Invalid input type for name - forcing failure by providing a dict instead of string)
  microsoft.scvmm.scvmm_vm_info:
    name:
      invalid: type
  register: fail_info
  ignore_errors: true

- name: Assert module fails with invalid input
  assert:
    that:
      - fail_info.failed is true
      - "'argument' in fail_info.msg or 'type' in fail_info.msg"

- name: Run in Check Mode
  microsoft.scvmm.scvmm_vm_info:
  check_mode: true
  register: check_mode_info

- name: Assert check mode does not change state and returns vms
  assert:
    that:
      - not check_mode_info.changed
      - check_mode_info.vms is defined
